    <!--
      WKWebView (và một số superapp webview) đôi khi chặn `blob:` Worker.
      Hack: nếu app tạo Worker từ Blob([string], {type:"text/javascript"}) thì
      chuyển `URL.createObjectURL(blob)` -> `data:text/javascript;base64,...`
      để Worker vẫn chạy được.
    -->
    <script>
      (function () {
        try {
          var OrigBlob = window.Blob;
          if (typeof OrigBlob !== "function") return;

          function PatchedBlob(parts, opts) {
            var b = new OrigBlob(parts, opts);
            try {
              if (
                opts &&
                opts.type === "text/javascript" &&
                parts &&
                parts.length === 1 &&
                typeof parts[0] === "string"
              ) {
                b.__zy_text = parts[0];
              }
            } catch (_) {}
            return b;
          }
          PatchedBlob.prototype = OrigBlob.prototype;
          PatchedBlob.prototype.constructor = PatchedBlob;
          window.Blob = PatchedBlob;

          function toBase64Utf8(str) {
            // UTF-8 safe base64
            return btoa(unescape(encodeURIComponent(str)));
          }

          function wrapCreateObjectURL(urlApi) {
            if (!urlApi || typeof urlApi.createObjectURL !== "function") return;
            var orig = urlApi.createObjectURL.bind(urlApi);
            urlApi.createObjectURL = function (blob) {
              try {
                if (
                  blob &&
                  blob.type === "text/javascript" &&
                  typeof blob.__zy_text === "string" &&
                  blob.__zy_text.length > 0
                ) {
                  return "data:text/javascript;base64," + toBase64Utf8(blob.__zy_text);
                }
              } catch (_) {}
              return orig(blob);
            };
          }

          wrapCreateObjectURL(window.URL);
          wrapCreateObjectURL(window.webkitURL);
          wrapCreateObjectURL(window.mozURL);
          wrapCreateObjectURL(window.msURL);
        } catch (_) {
          // best-effort
        }
      })();
    </script>
