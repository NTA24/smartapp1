    <!--
      WKWebView (và một số superapp webview) đôi khi chặn `blob:` Worker.
      Hack: nếu app tạo Worker từ Blob([string], {type:"text/javascript"}) thì
      chuyển `URL.createObjectURL(blob)` -> `data:text/javascript;base64,...`
      để Worker vẫn chạy được.
    -->
    <script>
      (function () {
        try {
          var OrigBlob = window.Blob;
          if (typeof OrigBlob !== "function") return;

          function PatchedBlob(parts, opts) {
            var b = new OrigBlob(parts, opts);
            try {
              if (
                opts &&
                opts.type === "text/javascript" &&
                parts &&
                parts.length === 1 &&
                typeof parts[0] === "string"
              ) {
                b.__zy_text = parts[0];
              }
            } catch (_) {}
            return b;
          }
          PatchedBlob.prototype = OrigBlob.prototype;
          PatchedBlob.prototype.constructor = PatchedBlob;
          window.Blob = PatchedBlob;

          function toBase64Utf8(str) {
            // UTF-8 safe base64
            return btoa(unescape(encodeURIComponent(str)));
          }

          function wrapCreateObjectURL(urlApi) {
            if (!urlApi || typeof urlApi.createObjectURL !== "function") return;
            var orig = urlApi.createObjectURL.bind(urlApi);
            urlApi.createObjectURL = function (blob) {
              try {
                if (
                  blob &&
                  blob.type === "text/javascript" &&
                  typeof blob.__zy_text === "string" &&
                  blob.__zy_text.length > 0
                ) {
                  return "data:text/javascript;base64," + toBase64Utf8(blob.__zy_text);
                }
              } catch (_) {}
              return orig(blob);
            };
          }

          wrapCreateObjectURL(window.URL);
          wrapCreateObjectURL(window.webkitURL);
          wrapCreateObjectURL(window.mozURL);
          wrapCreateObjectURL(window.msURL);
        } catch (_) {
          // best-effort
        }
      })();
    </script>
    <script>
      (function () {
        // Patch UI for camera back button in bundled ZYApp pages.
        // Target is confirmed by SVG rect id: LeftOutline-矩形
        function findBackTapTarget() {
          var marker = document.getElementById("LeftOutline-矩形");
          if (!marker) return null;
          var cur = marker.parentElement;
          while (cur && cur !== document.body) {
            if (cur.tagName === "BUTTON" || cur.tagName === "A") return cur;
            cur = cur.parentElement;
          }
          return marker.parentElement || null;
        }

        function styleBackButton(el) {
          if (!el || !(el instanceof HTMLElement)) return;
          el.style.width = "38px";
          el.style.height = "38px";
          el.style.minWidth = "38px";
          el.style.minHeight = "38px";
          el.style.display = "inline-flex";
          el.style.alignItems = "center";
          el.style.justifyContent = "center";
          el.style.background = "#ffffff";
          el.style.border = "1.5px solid #b8c3d4";
          el.style.borderRadius = "999px";
          el.style.boxShadow = "0 1px 6px rgba(15, 23, 42, 0.08)";
          el.style.boxSizing = "border-box";
          el.style.textDecoration = "none";
        }

        function patchBackButtons() {
          try {
            var backEl = findBackTapTarget();
            styleBackButton(backEl);
          } catch (_) {}
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", patchBackButtons);
        } else {
          patchBackButtons();
        }

        // Re-apply because page content is SPA + async render
        setInterval(patchBackButtons, 800);
      })();
    </script>
